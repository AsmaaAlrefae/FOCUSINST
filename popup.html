<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>FocusInst</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 256px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      font-size: 13px;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    /* Instagram gradient */
    :root {
      --ig-grad: linear-gradient(45deg, #FEDA75, #FA7E1E, #D62976, #962FBF, #4F5BD5);
    }

    body.theme-dark {
      --bg: #000; --surface: #1C1C1C; --border: #363636;
      --text: #F5F5F5; --text-muted: #A8A8A8; --text-faint: #555;
      --hover: #161616; --toggle-track: #363636; --toggle-off: #666;
    }
    body.theme-light {
      --bg: #fff; --surface: #FAFAFA; --border: #DBDBDB;
      --text: #262626; --text-muted: #737373; --text-faint: #C7C7C7;
      --hover: #F5F5F5; --toggle-track: #DBDBDB; --toggle-off: #B0B0B0;
    }

    /* Header */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      position: relative;
    }
    /* Gradient top stripe */
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--ig-grad);
    }

    .logo-icon {
      width: 30px; height: 30px;
      background: var(--ig-grad);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-text h2 { font-size: 14px; font-weight: 700; color: var(--text); }
    .logo-text p  { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    .section { padding: 12px 16px; border-bottom: 1px solid var(--border); }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

    .label      { font-size: 13px; font-weight: 500; color: var(--text); }
    .label-desc { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* Switch */
    .switch { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
    .switch input { opacity:0; width:0; height:0; }
    .slider {
      position: absolute; inset: 0;
      background: var(--toggle-track);
      border-radius: 11px; cursor: pointer;
      transition: background 0.22s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      left: 3px; top: 3px;
      background: var(--toggle-off);
      border-radius: 50%;
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1), background 0.22s;
    }
    input:checked + .slider { background: var(--ig-grad); }
    input:checked + .slider:before { transform: translateX(17px); background: #fff; }

    /* Status pill */
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 7px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .dot.on  { background: #D62976; }
    .dot.off { background: var(--toggle-off); }
    .status-text { font-size: 11px; color: var(--text-muted); }

    /* Theme buttons */
    .theme-title {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-faint);
      font-weight: 600; margin-bottom: 10px;
    }

    .theme-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .theme-btn {
      display: flex; flex-direction: column;
      align-items: center; gap: 7px;
      padding: 10px 8px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      cursor: pointer; transition: border-color 0.15s;
      color: var(--text-muted); font-size: 11px; font-weight: 500;
      font-family: inherit;
    }
    .theme-btn:hover { border-color: #D62976; }
    .theme-btn.active {
      border-color: transparent;
      /* gradient border */
      background: linear-gradient(var(--surface), var(--surface)) padding-box,
                  var(--ig-grad) border-box;
      color: #D62976;
    }

    /* Mini preview */
    .theme-preview {
      width: 64px; height: 36px; border-radius: 6px;
      overflow: hidden; border: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .preview-nav {
      height: 10px; display: flex; align-items: center;
      padding: 0 4px; gap: 3px;
    }
    .preview-dot { width:4px; height:4px; border-radius:50%; }
    .preview-body { flex:1; display:flex; align-items:center; justify-content:center; padding: 2px 4px; }
    .preview-bar  { height:4px; border-radius:2px; width:80%; background:var(--ig-grad); }

    .preview-dark  .preview-nav  { background:#1C1C1C; }
    .preview-dark  .preview-dot  { background:#363636; }
    .preview-dark  .preview-body { background:#000; }

    .preview-light .preview-nav  { background:#FAFAFA; }
    .preview-light .preview-dot  { background:#DBDBDB; }
    .preview-light .preview-body { background:#FFF; }

    /* Hidden list */
    .hidden-title {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-faint);
      font-weight: 600; margin-bottom: 9px;
    }
    .hidden-list { display:flex; flex-direction:column; gap:6px; }
    .hidden-item {
      display:flex; align-items:center; gap:8px;
      font-size:12px; color:var(--text-muted);
    }
    .tick {
      width:14px; height:14px; border-radius:50%;
      background: var(--ig-grad);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
  </style>
</head>
<body class="theme-dark">

  <div class="header">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="5"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="white" stroke="none"/>
      </svg>
    </div>
    <div class="logo-text">
      <h2>FocusInst</h2>
      <p>Instagram without the noise</p>
    </div>
  </div>

  <div class="section">
    <div class="row">
      <div>
        <div class="label">Focus Mode</div>
        <div class="label-desc">Hide feed, stories & suggestions</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="focus-toggle" checked/>
        <span class="slider"></span>
      </label>
    </div>
    <div class="status-pill">
      <div class="dot on" id="status-dot"></div>
      <span class="status-text" id="status-text">Active — feed is hidden</span>
    </div>
  </div>

  <div class="section">
    <div class="theme-title">Theme</div>
    <div class="theme-options">
      <button class="theme-btn active" id="btn-dark" data-theme="dark">
        <div class="theme-preview preview-dark">
          <div class="preview-nav"><div class="preview-dot"></div><div class="preview-dot"></div></div>
          <div class="preview-body"><div class="preview-bar"></div></div>
        </div>
        Dark
      </button>
      <button class="theme-btn" id="btn-light" data-theme="light">
        <div class="theme-preview preview-light">
          <div class="preview-nav"><div class="preview-dot"></div><div class="preview-dot"></div></div>
          <div class="preview-body"><div class="preview-bar"></div></div>
        </div>
        Light
      </button>
    </div>
  </div>

  <div class="section" style="border-bottom:none;">
    <div class="hidden-title">Currently Hiding</div>
    <div class="hidden-list">
      <div class="hidden-item">
        <div class="tick"><svg width="8" height="8" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2 6 5 9 10 3"/></svg></div>
        Main feed & posts
      </div>
      <div class="hidden-item">
        <div class="tick"><svg width="8" height="8" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2 6 5 9 10 3"/></svg></div>
        Stories bar
      </div>
      <div class="hidden-item">
        <div class="tick"><svg width="8" height="8" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2 6 5 9 10 3"/></svg></div>
        Suggested people
      </div>
      <div class="hidden-item">
        <div class="tick"><svg width="8" height="8" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2"><polyline points="2 6 5 9 10 3"/></svg></div>
        Sponsored posts
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
